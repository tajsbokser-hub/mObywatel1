<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>xObywatel 4.0</title>

  <script>
    (function () {
      try {
        var stored = localStorage.getItem("theme-preference");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/pages/login.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <script src="js/theme.js" defer></script>
</head>
<body>
<div class="login">
  <header class="login__header">
    <div class="login__logo-group">
      <img src="assets/icons/mobywatel_logo_horizontal.svg" alt="mObywatel" class="login__logo-image app-logo" />
    </div>
    <div class="login__intro">
      <h1 class="login__title">Dzień dobry!</h1>
      <p class="login__subtitle">Zaloguj się do aplikacji.</p>
    </div>
  </header>

  <main class="login__main">
    <div class="login__form">
      <label class="login__password-label" for="usernameInput">Nazwa użytkownika</label>
      <div class="login__password" style="margin-bottom:14px;">
        <input id="usernameInput" type="text" class="login__password-input"
               autocomplete="username" placeholder="np. admin" />
      </div>

      <label class="login__password-label" for="passwordInput">Hasło</label>
      <div class="login__password">
        <input id="passwordInput" type="password" class="login__password-input"
               autocomplete="current-password" />
        <button type="button" class="login__eye" aria-label="Pokaż hasło"
                onclick="togglePasswordVisibility()">
          <img id="eyeIcon" src="assets/icons/show_password.svg" alt="Pokaż hasło" />
        </button>
      </div>

      <div id="passwordError" class="login__error"
           style="display:none;color:#b91c1c;margin:6px 0 -2px 0;font-size:13px;"></div>
    </div>
  </main>

  <button class="login__submit" type="button" id="loginBtn" onclick="doLogin()">
    Zaloguj się
  </button>

  <footer class="login__footer">
    <div class="login__footerImages">
      <img src="assets/icons/coi.svg" alt="COI" class="login__footerLogo" />
      <img src="assets/icons/ministerstwo_cyfryzacji.svg" alt="MC" class="login__footerLogo" />
      <img src="assets/icons/coi_common_ui_kpo_logo_group.svg" alt="KPO"
           class="login__footerLogo login__kpoLogo"
           data-dark-src="assets/icons/coi_common_ui_kpo_logo_group_dark.svg" />
    </div>
    <p class="login__version">wersja 4.73.2 (5559)</p>
  </footer>
</div>

<script>
  // ── Hasła — wpisz tu własne dane ──────────────────────────────
  // Format: { "nazwa_uzytkownika": "haslo" }
  var USERS = {
    "admin":  "admin123",
    "user":   "haslo123"
  };
  // Admini (mogą widzieć przycisk Admin w panelu)
  var ADMINS = ["admin"];
  // ─────────────────────────────────────────────────────────────

  function togglePasswordVisibility() {
    var input = document.getElementById("passwordInput");
    var icon  = document.getElementById("eyeIcon");
    if (input.type === "password") {
      input.type = "text";
      icon.src = "assets/icons/hide_password.svg";
    } else {
      input.type = "password";
      icon.src = "assets/icons/show_password.svg";
    }
  }

  function doLogin() {
    var username = document.getElementById("usernameInput").value.trim();
    var password = document.getElementById("passwordInput").value;
    var errEl    = document.getElementById("passwordError");

    if (!username) {
      errEl.textContent = "Podaj nazwę użytkownika.";
      errEl.style.display = "block";
      return;
    }

    if (USERS[username] && USERS[username] === password) {
      // Zapisz sesję w localStorage
      localStorage.setItem("xo_loggedin", "true");
      localStorage.setItem("xo_username", username);
      localStorage.setItem("xo_isadmin", ADMINS.includes(username) ? "true" : "false");
      window.location.href = "panel.html";
    } else {
      errEl.textContent = "Nieprawidłowa nazwa użytkownika lub hasło.";
      errEl.style.display = "block";
      document.getElementById("passwordInput").value = "";
    }
  }

  // Enter zatwierdza formularz
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") doLogin();
  });

  // Jeśli już zalogowany — od razu do panelu
  if (localStorage.getItem("xo_loggedin") === "true") {
    window.location.href = "panel.html";
  }
</script>
</body>
</html>
